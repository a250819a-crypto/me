<!DOCTYPE html>
<html>

<head>
<style>

	/* スムーズスクロール */
	html {
		scroll-behavior: smooth;
	}

	/* Navbar に隠れないようにする */
	section {
		scroll-margin-top: 80px;
		min-height: 500px;
	}

</style>

	<title>Navbar Demo</title>

	<!-- Bootstrap CSS -->
	<link
		href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
		rel="stylesheet"
	>

</head>

<body>
<!-- Navbar -->
<nav class="navbar navbar-expand-lg bg-dark navbar-dark sticky-top">

	<div class="container">

		<!-- ロゴ -->
		<a class="navbar-brand" href="#">
			My Website
		</a>

		<!-- ハンバーガーボタン -->
		<button
			class="navbar-toggler"
			type="button"
			data-bs-toggle="collapse"
			data-bs-target="#navbarMenu"
		>

			<span class="navbar-toggler-icon"></span>

		</button>

		<!-- 開閉するメニュー -->
		<div class="collapse navbar-collapse" id="navbarMenu">

			<div class="navbar-nav me-auto">

				<a class="nav-link" href="#電気の追加・削除">
					Home
				</a>

				<a class="nav-link" href="#現在の状況">
					About
				</a>

				<a class="nav-link" href="#部屋別">
					Gallery
				</a>


			</div>

		</div>

	</div>
<!-- 検索 -->
<form class="d-flex">

	<input
		class="form-control me-2"
		type="search"
		placeholder="Search"
	>

	<button
		class="btn btn-outline-light"
		type="submit"
	>
		Search
	</button>

</form>

</nav>


	<!-- Home -->
<section id="home" class="p-5 bg-light">
	<h2>Home</h2>
	<p>Home section</p>
</section>

<!-- About -->
<section id="about" class="p-5">
	<h2>About</h2>
	<p>About section</p>
</section>

<!-- Gallery -->
<section id="gallery" class="p-5 bg-light">
	<h2>Gallery</h2>
	<p>Gallery section</p>
</section>

<!-- Contact -->
<section id="contact" class="p-5">
	<h2>Contact</h2>
	<p>Contact section</p>
</section>
My Website</h1>

	<!-- Bootstrap JavaScript -->
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
