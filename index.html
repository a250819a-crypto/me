<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>スマートホーム総合管理パネル</title>
    <style>
        :root {
            --bg-color: #f4f6f9;
            --card-bg: #ffffff;
            --text-main: #2d3748;
            --text-muted: #718096;
            --primary: #3182ce;
            --danger: #e53e3e;
            --danger-hover: #c53030;
            --warning: #dd6b20;
            --success: #38a169;
            --light-on: #ecc94b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.5;
            padding: 16px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 24px;
            padding: 8px 0;
        }

        h1 {
            font-size: 1.6rem;
            color: #1a202c;
            margin-bottom: 6px;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        /* 外出ボタン */
        .exit-container {
            margin-bottom: 24px;
        }

        .exit-btn {
            background-color: var(--danger);
            color: white;
            border: none;
            padding: 16px 24px;
            font-size: 1.05rem;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(229, 62, 62, 0.2);
            transition: all 0.2s ease;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .exit-btn:hover {
            background-color: var(--danger-hover);
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(229, 62, 62, 0.3);
        }

        .exit-btn:active {
            transform: translateY(1px);
        }

        /* 画面全体のレスポンシブグリッド配置（PCでは2〜3列、スマホでは1列） */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 24px;
        }

        .section {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
        }

        h2 {
            border-left: 4px solid var(--primary);
            padding-left: 10px;
            color: #1a202c;
            font-size: 1.15rem;
            margin-bottom: 16px;
        }

        /* コンロ・部屋の内部グリッド */
        .inner-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
        }

        /* カードの共通スタイル */
        .card {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* ステータスバッジ */
        .status-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: bold;
        }
        .badge-on { background-color: #c6f6d5; color: #22543d; }
        .badge-off { background-color: #edf2f7; color: #4a5568; }
        .badge-orange { background-color: #feebc8; color: #744210; }
        .badge-red { background-color: #fed7d7; color: #742a2a; }

        /* コンロ専用 */
        .stove-title { font-weight: bold; margin-bottom: 8px; font-size: 1rem; }
        .stove-extinguish-btn {
            width: 100%;
            margin-top: 12px;
            padding: 12px;
            border: 2px solid var(--danger);
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            background-color: #fff5f5;
            color: var(--danger);
            transition: all 0.2s;
            font-size: 0.95rem;
        }
        .stove-extinguish-btn:hover:not(.disabled) { background-color: #fed7d7; }
        .stove-extinguish-btn.disabled {
            background-color: #edf2f7;
            color: var(--text-muted);
            border-color: #cbd5e0;
            cursor: not-allowed;
        }

        /* 部屋専用（スマホで押しやすい2列2行のライトボタン） */
        .room-header-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .room-title { font-size: 1rem; font-weight: bold; }
        .room-stats { display: flex; gap: 8px; align-items: center; }
        .room-temp { background: white; padding: 2px 6px; border-radius: 6px; border: 1px solid #e2e8f0; color: #ed8936; font-weight: bold; font-size: 0.95rem; }
        
        .light-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 12px;
        }
        .light-btn {
            padding: 14px 10px; /* スマホでタップしやすい高さ */
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.15s;
            font-size: 0.9rem;
        }
        .light-btn.off { background-color: #e2e8f0; color: #4a5568; }
        .light-btn.on { background-color: #fef3c7; color: #b7791f; box-shadow: 0 0 10px rgba(251, 191, 36, 0.3); }

        .aircon-btn {
            width: 100%;
            padding: 12px;
            background-color: #e2e8f0;
            color: #4a5568;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.15s;
            font-size: 0.9rem;
        }
        .aircon-btn.active { background-color: #ebf8ff; color: #2b6cb0; box-shadow: 0 0 10px rgba(66, 153, 225, 0.2); }

        /* お風呂専用 */
        .bath-panel { display: flex; flex-direction: column; gap: 16px; }
        .bath-header { display: flex; justify-content: space-between; align-items: center; background: #e2e8f0; padding: 12px; border-radius: 8px; }
        .bath-row { display: flex; align-items: center; justify-content: space-between; }
        .bath-select { padding: 10px; border-radius: 8px; border: 1px solid #cbd5e0; font-size: 1rem; font-weight: bold; background: white; }
        .water-meter-container { background: white; padding: 14px; border-radius: 10px; border: 1px solid #e2e8f0; }
        .water-info-text { display: flex; justify-content: space-between; font-size: 0.95rem; margin-bottom: 8px; flex-wrap: wrap; gap: 4px; }
        .water-bar { width: 100%; height: 24px; border-radius: 12px; overflow: hidden; background-color: #e2e8f0; }
        .water-fill { height: 100%; width: 15%; background-color: var(--danger); transition: width 0.5s ease; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 0.8rem; }
        
        /* お風呂ボタン（スマホは縦並び、PCは横並び） */
        .bath-btn-group { display: grid; grid-template-columns: 1fr; gap: 10px; }
        .bath-action-btn { padding: 14px; border: 1px solid #cbd5e0; border-radius: 8px; font-weight: bold; cursor: pointer; background-color: white; color: #4a5568; font-size: 0.95rem; transition: all 0.15s; }
        .bath-action-btn.active-boil { background-color: var(--primary); color: white; border-color: #2b6cb0; }
        .bath-action-btn.active-reheat { background-color: var(--warning); color: white; border-color: #c05621; }
        .bath-action-btn.active-add { background-color: var(--success); color: white; border-color: #2f855a; }

        /* 💻 デスクトップ＆タブレット向けのレイアウト（横幅が広い時） */
        @media (min-width: 768px) {
            body { padding: 32px; }
            h1 { font-size: 2rem; }
            
            /* メイン画面を2列配置（部屋管理を左、キッチンとお風呂を右に） */
            .dashboard-grid { grid-template-columns: 1.1fr 0.9fr; }
            
            /* 各セクション内のグリッドを横並びにする */
            .stove-grid { grid-template-columns: repeat(3, 1fr); }
            .room-grid { grid-template-columns: repeat(2, 1fr); }
            .bath-btn-group { grid-template-columns: repeat(3, 1fr); }
            
            .exit-btn { max-width: 400px; margin: 0 auto; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>🏠 スマートホーム・総合管理</h1>
            <div class="subtitle">遠隔安全消火システム（消し忘れ防止・HEMS連動）</div>
        </header>

        <div class="exit-container">
            <button class="exit-btn" onclick="triggerAllOffForExit()">🚶 外出時の一斉OFF（コンロ・照明・空調）</button>
        </div>

        <div class="dashboard-grid">
            
            <div class="section">
                <h2>🚪 各部屋の個別管理</h2>
                <div class="inner-grid room-grid">
                    
                    <div class="card">
                        <div class="room-header-info">
                            <h3 class="room-title">部屋 A</h3>
                            <div class="room-stats">
                                <span id="temp-A" class="room-temp">28.0 °C</span>
                                <span id="aircon-badge-A" class="status-badge badge-off">OFF</span>
                            </div>
                        </div>
                        <div class="light-container">
                            <button id="light-A-1" class="light-btn off" onclick="toggleLight('A', 1)">💤 ライト1</button>
                            <button id="light-A-2" class="light-btn off" onclick="toggleLight('A', 2)">💤 ライト2</button>
                            <button id="light-A-3" class="light-btn off" onclick="toggleLight('A', 3)">💤 ライト3</button>
                            <button id="light-A-4" class="light-btn off" onclick="toggleLight('A', 4)">💤 ライト4</button>
                        </div>
                        <button id="aircon-btn-A" class="aircon-btn" onclick="toggleAircon('A')">❄️ エアコン オン</button>
                    </div>

                    <div class="card">
                        <div class="room-header-info">
                            <h3 class="room-title">部屋 B</h3>
                            <div class="room-stats">
                                <span id="temp-B" class="room-temp">28.4 °C</span>
                                <span id="aircon-badge-B" class="status-badge badge-off">OFF</span>
                            </div>
                        </div>
                        <div class="light-container">
                            <button id="light-B-1" class="light-btn off" onclick="toggleLight('B', 1)">💤 ライト1</button>
                            <button id="light-B-2" class="light-btn off" onclick="toggleLight('B', 2)">💤 ライト2</button>
                            <button id="light-B-3" class="light-btn off" onclick="toggleLight('B', 3)">💤 ライト3</button>
                            <button id="light-B-4" class="light-btn off" onclick="toggleLight('B', 4)">💤 ライト4</button>
                        </div>
                        <button id="aircon-btn-B" class="aircon-btn" onclick="toggleAircon('B')">❄️ エアコン オン</button>
                    </div>

                    <div class="card">
                        <div class="room-header-info">
                            <h3 class="room-title">部屋 C</h3>
                            <div class="room-stats">
                                <span id="temp-C" class="room-temp">27.6 °C</span>
                                <span id="aircon-badge-C" class="status-badge badge-off">OFF</span>
                            </div>
                        </div>
                        <div class="light-container">
                            <button id="light-C-1" class="light-btn off" onclick="toggleLight('C', 1)">💤 ライト1</button>
                            <button id="light-C-2" class="light-btn off" onclick="toggleLight('C', 2)">💤 ライト2</button>
                            <button id="light-C-3" class="light-btn off" onclick="toggleLight('C', 3)">💤 ライト3</button>
                            <button id="light-C-4" class="light-btn off" onclick="toggleLight('C', 4)">💤 ライト4</button>
                        </div>
                        <button id="aircon-btn-C" class="aircon-btn" onclick="toggleAircon('C')">❄️ エアコン オン</button>
                    </div>

                    <div class="card">
                        <div class="room-header-info">
                            <h3 class="room-title">部屋 D</h3>
                            <div class="room-stats">
                                <span id="temp-D" class="room-temp">28.0 °C</span>
                                <span id="aircon-badge-D" class="status-badge badge-off">OFF</span>
                            </div>
                        </div>
                        <div class="light-container">
                            <button id="light-D-1" class="light-btn off" onclick="toggleLight('D', 1)">💤 ライト1</button>
                            <button id="light-D-2" class="light-btn off" onclick="toggleLight('D', 2)">💤 ライト2</button>
                            <button id="light-D-3" class="light-btn off" onclick="toggleLight('D', 3)">💤 ライト3</button>
                            <button id="light-D-4" class="light-btn off" onclick="toggleLight('D', 4)">💤 ライト4</button>
                        </div>
                        <button id="aircon-btn-D" class="aircon-btn" onclick="toggleAircon('D')">❄️ エアコン オン</button>
                    </div>

                </div>
            </div>

            <div style="display: flex; flex-direction: column; gap: 24px;">
                
                <div class="section">
                    <h2>🍳 キッチン・コンロ（消火専用）</h2>
                    <div class="inner-grid stove-grid">
                        
                        <div class="card">
                            <div class="stove-title">🔥 左コンロ (ガス)</div>
                            <div><span id="stove-badge-1" class="status-badge badge-on">中火で点火中</span></div>
                            <button id="btn-extinguish-1" class="stove-extinguish-btn" onclick="extinguishStove(1)">⚠️ 遠隔消火</button>
                        </div>

                        <div class="card">
                            <div class="stove-title">🔥 右コンロ (ガス)</div>
                            <div><span id="stove-badge-2" class="status-badge badge-red">強火で点火中</span></div>
                            <button id="btn-extinguish-2" class="stove-extinguish-btn" onclick="extinguishStove(2)">⚠️ 遠隔消火</button>
                        </div>

                        <div class="card">
                            <div class="stove-title">⚡ 中央 (IH)</div>
                            <div><span id="stove-badge-3" class="status-badge badge-red">2000W 稼働中</span></div>
                            <button id="btn-extinguish-3" class="stove-extinguish-btn" onclick="extinguishStove(3)">⚠️ 切る</button>
                        </div>

                    </div>
                </div>

                <div class="section">
                    <h2>♨️ お風呂・給湯管理</h2>
                    <div class="bath-panel">
                        <div class="bath-header">
                            <strong>給湯器状態:</strong>
                            <span id="bath-status-badge" class="status-badge badge-off">停止中</span>
                        </div>
                        <div class="bath-row">
                            <label for="bath-temp-select"><strong>設定温度:</strong></label>
                            <select id="bath-temp-select" class="bath-select" onchange="updateBathUI()">
                                <option value="39">39 °C (ぬるめ)</option>
                                <option value="40">40 °C</option>
                                <option value="41" selected>41 °C (標準)</option>
                                <option value="42">42 °C</option>
                                <option value="43">43 °C (熱め)</option>
                            </select>
                        </div>
                        <div class="water-meter-container">
                            <div class="water-info-text">
                                <span><strong>💧 浴槽内の残量:</strong></span>
                                <div><strong>約 <span id="water-level-liters">30</span> L</strong> / 200 L (<span id="water-level-percent">15</span>%)</div>
                            </div>
                            <div class="water-bar"><div id="water-fill-bar" class="water-fill">15%</div></div>
                        </div>
                        <div class="bath-btn-group">
                            <button id="btn-bath-boil" class="bath-action-btn" onclick="changeBathMode('boil')">🛁 お風呂を沸かす</button>
                            <button id="btn-bath-reheat" class="bath-action-btn" onclick="changeBathMode('reheat')">🔥 追い炊き</button>
                            <button id="btn-bath-add" class="bath-action-btn" onclick="changeBathMode('add')">💧 お湯増し</button>
                        </div>
                    </div>
                </div>

            </div>

        </div>
    </div>

    <script>
        let activeLightsCount = 0;

        let roomData = {
            A: { aircon: false, tempOff: 28.0, tempOn: 23.5, currentTemp: 28.0 },
            B: { aircon: false, tempOff: 28.4, tempOn: 24.0, currentTemp: 28.4 },
            C: { aircon: false, tempOff: 27.6, tempOn: 23.8, currentTemp: 27.6 },
            D: { aircon: false, tempOff: 28.0, tempOn: 24.3, currentTemp: 28.0 }
        };

        let stoveData = {
            1: { type: 'gas', isOn: true, rate: 0.11 },
            2: { type: 'gas', isOn: true, rate: 0.23 },
            3: { type: 'electric', isOn: true, rate: 2000 }
        };

        let currentBathMode = 'stop';
        let bathWaterLevelPercent = 15;
        const TOTAL_WATER_CAPACITY_L = 200;
        let bathTimer = null;

        function triggerAllOffForExit() {
            if (confirm("外出しますか？ すべてのコンロ・照明・エアコンを停止します。")) {
                for (let i = 1; i <= 3; i++) { extinguishStove(i); }

                const rooms = ['A', 'B', 'C', 'D'];
                rooms.forEach(room => {
                    for (let i = 1; i <= 4; i++) {
                        const lightBtn = document.getElementById(`light-${room}-${i}`);
                        if (lightBtn && lightBtn.classList.contains('on')) { toggleLight(room, i); }
                    }
                    if (roomData[room].aircon) { toggleAircon(room); }
                });

                currentBathMode = 'stop';
                clearInterval(bathTimer);
                bathTimer = null;
                updateBathUI();

                alert("すべての機器を安全にオフにしました。お気をつけてお出かけください！");
            }
        }

        function toggleLight(roomName, lightNum) {
            const btn = document.getElementById(`light-${roomName}-${lightNum}`);
            if (btn.classList.contains('off')) {
                btn.classList.remove('off'); btn.classList.add('on');
                btn.innerText = `💡 ライト${lightNum}`;
                activeLightsCount++;
            } else {
                btn.classList.remove('on'); btn.classList.add('off');
                btn.innerText = `💤 ライト${lightNum}`;
                activeLightsCount--;
            }
        }

        function toggleAircon(roomName) {
            let room = roomData[roomName]; room.aircon = !room.aircon;
            const badge = document.getElementById(`aircon-badge-${roomName}`);
            const btn = document.getElementById(`aircon-btn-${roomName}`);
            const tempDisp = document.getElementById(`temp-${roomName}`);

            if (room.aircon) {
                room.currentTemp = room.tempOn; badge.innerText = "ON"; badge.className = "status-badge badge-on";
                btn.innerText = "❄️ エアコン 停止"; btn.classList.add('active'); tempDisp.style.color = "#2980b9";
            } else {
                room.currentTemp = room.tempOff; badge.innerText = "OFF"; badge.className = "status-badge badge-off";
                btn.innerText = "❄️ エアコン オン"; btn.classList.remove('active'); tempDisp.style.color = "#e67e22";
            }
            tempDisp.innerText = room.currentTemp.toFixed(1) + " °C";
        }

        function extinguishStove(stoveNum) {
            if (!stoveData[stoveNum].isOn) return;

            stoveData[stoveNum].isOn = false;
            stoveData[stoveNum].rate = 0;

            const badge = document.getElementById(`stove-badge-${stoveNum}`);
            const btn = document.getElementById(`btn-extinguish-${stoveNum}`);

            badge.innerText = "消火済み";
            badge.className = "status-badge badge-off";

            btn.innerText = "消火済み";
            btn.classList.add('disabled');
        }

        function changeBathMode(mode) {
            if (currentBathMode === mode) { currentBathMode = 'stop'; } else { currentBathMode = mode; }
            clearInterval(bathTimer); bathTimer = null;

            if (currentBathMode === 'boil' || currentBathMode === 'add') {
                bathTimer = setInterval(() => {
                    if (bathWaterLevelPercent < 100) {
                        bathWaterLevelPercent += 5;
                        if (bathWaterLevelPercent > 100) bathWaterLevelPercent = 100;
                    }
                    if (bathWaterLevelPercent === 100 && currentBathMode === 'boil') {
                        currentBathMode = 'stop'; clearInterval(bathTimer); updateBathUI();
                        setTimeout(() => alert("🎵 メロディ：お風呂が沸き上がりました！"), 600);
                    } else { updateBathUI(); }
                }, 500);
            }
            updateBathUI();
        }

        function updateBathUI() {
            const badge = document.getElementById('bath-status-badge');
            const temp = document.getElementById('bath-temp-select').value;
            const currentLiters = Math.round(TOTAL_WATER_CAPACITY_L * bathWaterLevelPercent / 100);

            document.getElementById('water-level-percent').innerText = bathWaterLevelPercent;
            document.getElementById('water-level-liters').innerText = currentLiters;
            
            const fillBar = document.getElementById('water-fill-bar');
            fillBar.style.width = bathWaterLevelPercent + "%"; fillBar.innerText = bathWaterLevelPercent + "%";

            if (bathWaterLevelPercent < 30) { fillBar.style.backgroundColor = "var(--danger)"; } 
            else if (bathWaterLevelPercent < 70) { fillBar.style.backgroundColor = "var(--warning)"; } 
            else { fillBar.style.backgroundColor = "var(--primary)"; }

            document.getElementById('btn-bath-boil').className = "bath-action-btn";
            document.getElementById('btn-bath-reheat').className = "bath-action-btn";
            document.getElementById('btn-bath-add').className = "bath-action-btn";

            if (currentBathMode === 'stop') {
                if (bathWaterLevelPercent === 100) { badge.innerText = "保温中"; badge.className = "status-badge badge-on"; } 
                else { badge.innerText = "停止中"; badge.className = "status-badge badge-off"; }
            } 
            else if (currentBathMode === 'boil') { badge.innerText = `湯沸かし中 (${temp}°C)`; badge.className = "status-badge badge-on"; document.getElementById('btn-bath-boil').classList.add('active-boil'); } 
            else if (currentBathMode === 'reheat') { badge.innerText = `追い炊き中 (${temp}°C)`; badge.className = "status-badge badge-orange"; document.getElementById('btn-bath-reheat').classList.add('active-reheat'); } 
            else if (currentBathMode === 'add') { badge.innerText = `お湯増し中 (${temp}°C)`; badge.className = "status-badge badge-on"; document.getElementById('btn-bath-add').classList.add('active-add'); }
        }

        updateBathUI();
    </script>
</body>
</html>
